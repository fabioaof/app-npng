# API (FastAPI) + PostgreSQL — alinhado a deploy em /var/www/nopain-nogain-api
# Uso na raiz do repo: docker compose up -d --build
# API: http://127.0.0.1:8000/docs  |  Postgres: localhost:5432
#
# Variáveis: ficheiro .env junto a este ficheiro (ver deploy/env.docker.example).
# O nome do projeto Compose segue a pasta (ex.: nopain-nogain-api-* nos contentores).

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-npng}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-npng}
      POSTGRES_DB: ${POSTGRES_DB:-npng}
    ports:
      - "5432:5432"
    volumes:
      - npng_pgdata:/var/lib/postgresql/data
    healthcheck:
      # Ajustar se alterares POSTGRES_USER / POSTGRES_DB em .env
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-npng} -d ${POSTGRES_DB:-npng} || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://npng:npng@db:5432/npng}
      JWT_SECRET: ${JWT_SECRET:-dev-change-me-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8090,http://127.0.0.1:8090,http://localhost:9000,http://127.0.0.1:9000}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8000}
      UPLOAD_DIR: /data/uploads
    volumes:
      - npng_uploads:/data/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  npng_pgdata:
  npng_uploads:
